<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>852hk81jp 到貨收據</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;font-family:'Noto Sans HK',system-ui,sans-serif;background:#F4F6F9;}
  #state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:#4A5568;font-size:13px;text-align:center;padding:20px;}
  .spin{width:30px;height:30px;border:3px solid rgba(201,168,76,.25);border-top-color:#C9A84C;border-radius:50%;animation:sp .8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  #frame{display:none;width:100%;height:100vh;border:none;}
  .err-box{background:#fff;border-radius:12px;padding:24px;max-width:340px;box-shadow:0 4px 16px rgba(13,27,42,.12);}
  .err-box h3{color:#DC2626;font-size:15px;margin-bottom:8px;}
  .err-box a{display:inline-block;margin-top:12px;background:#0D1B2A;color:#C9A84C;padding:10px 18px;border-radius:6px;font-weight:700;text-decoration:none;font-size:13px;}
</style>
</head>
<body>

<div id="state">
  <div class="spin"></div>
  <div>載入收據內容中…</div>
</div>

<iframe id="frame" sandbox="allow-popups"></iframe>

<script>
(async function(){
  const params = new URLSearchParams(window.location.search);
  const src = params.get('src');
  const stateEl = document.getElementById('state');
  const frame = document.getElementById('frame');

  if(!src){
    stateEl.innerHTML = `<div class="err-box"><h3>⚠️ 缺少參數</h3><div>網址需要 ?src= 指向原始 HTML 檔案位置</div></div>`;
    return;
  }

  try{
    const res = await fetch(src, { cache: 'no-store' });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const html = await res.text();

    // 用 srcdoc 塞入完整 HTML（包含 <!DOCTYPE> <html> 等），
    // iframe 會用自己嘅 document 重新 parse + render，唔受外層 supabase 嘅 content-type 影響
    frame.srcdoc = html;
    frame.onload = () => {
      stateEl.style.display = 'none';
      frame.style.display = 'block';
      // 自動調整 iframe 高度去配合內容（同 origin 限制下用 try/catch）
      try{
        const h = frame.contentWindow.document.body.scrollHeight;
        if(h) frame.style.height = h + 'px';
      }catch(e){}
    };
  }catch(err){
    stateEl.innerHTML = `<div class="err-box">
      <h3>⚠️ 載入失敗</h3>
      <div>${err.message || '無法讀取收據內容'}</div>
      <a href="${src}" target="_blank">嘗試直接開啟原始連結</a>
    </div>`;
  }
})();
</script>

</body>
</html>
